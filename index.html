<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bogura Info Portal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="header">
  <div class="logo">Bogura Portal</div>

  <nav class="navbar">
    <a href="#">Home</a>
    <a href="#">Doctors</a>
    <a href="#">Education</a>
    <a href="#">Services</a>
    <a href="#">News</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- HERO / SLIDER -->
<section class="hero">
  <div class="overlay">
    <h1>All Information About Bogura</h1>
    <p>Doctors • Education • Services • News</p>
  </div>

  <div class="search-box">

  <input type="text" id="searchInput" placeholder="Search doctors, education, services...">

  <button onclick="searchSite()">Search</button>

</div>
</section>

<!-- CARDS -->
<section class="grid">
  <div class="card">Doctors</div>
  <div class="card">Education</div>
  <div class="card">Services</div>
  <div class="card">Food</div>
  <div class="card">Emergency</div>
  <div class="card">News</div>
</section>

<script src="script.js"></script>
</body>
</html>
